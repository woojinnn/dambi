# Workspace-wide clippy configuration.
#
# `doc-valid-idents` extends the default list with project-specific
# CamelCase identifiers (protocol/family names + fork-specific contract
# class names) that are written in plain prose inside doc comments. The
# trailing ".." preserves clippy's defaults (so e.g. "iOS", "TypeScript"
# stay allowlisted).
doc-valid-idents = [
    "PancakeSwap",
    "PancakeSwapAMM",
    "PancakeSwapV3",
    "PancakeSwapStableSwap",
    "PancakeSwapInfinity",
    "AerodromeV1",
    "AerodromeSlipstream",
    "SwapRouter",
    "PoolManager",
    "StableSwap",
    "PoolEntry",
    "PoolRegistry",
    "DexFacts",
    "DexAction",
    "DexTrace",
    "..",
]
