# Adapter Registry — static-file server that mimics S3 from the client's view.
#
# Behavior:
#   - GET /manifest.json     -> short cache (60s), ETag for cheap revalidation, gzip on.
#   - GET /adapters/**/*.wasm -> immutable cache (1y), gzip off (wasm already compressed).
#   - CORS *  (dev only; production tightens via Cloudfront / bucket policy).
#   - Access logs flushed to stdout so `docker logs` shows traffic.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # WASM mime type — nginx's bundled mime.types does not always include it.
    types {
        application/wasm wasm;
    }

    # ---- logging -----------------------------------------------------------
    # Direct access + error logs to stdout/stderr so `docker logs` surfaces them.
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /dev/stdout main;
    error_log /dev/stderr warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # ---- gzip --------------------------------------------------------------
    # Compress JSON, plaintext, etc. Do NOT compress .wasm (already binary).
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/javascript
        text/xml
        application/xml;

    server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;

        # ---- CORS (dev) ---------------------------------------------------
        # Browser extensions and policy-rpc service consume this from other origins.
        # Production overrides this via env-injected nginx template or fronted CDN.
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Accept, Content-Type, If-None-Match" always;
        add_header Access-Control-Max-Age "3600" always;

        # ---- /manifest.json -----------------------------------------------
        # Short cache + ETag so clients can revalidate cheaply.
        # `add_header` inside a more-specific block REPLACES outer ones, so we
        # restate the CORS headers here.
        location = /manifest.json {
            etag on;
            add_header Cache-Control "public, max-age=60" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Accept, Content-Type, If-None-Match" always;
            default_type application/json;
        }

        # ---- /adapters/**/*.wasm ------------------------------------------
        # Immutable artifacts addressed by `<protocol>/<version>/adapter.wasm`.
        # Clients verify by sha256 against the manifest, so an immutable cache
        # is safe even across hot updates (new sha => new URL via manifest).
        location ~ ^/adapters/.+\.wasm$ {
            gzip off;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Accept, Content-Type, If-None-Match" always;
            default_type application/wasm;
        }

        # ---- OPTIONS preflight --------------------------------------------
        # Browser pre-flights any cross-origin GET with Accept/If-None-Match
        # headers; respond 204 quickly.
        if ($request_method = OPTIONS) {
            return 204;
        }

        # Reject anything that escapes the structured paths.
        location / {
            try_files $uri =404;
        }
    }
}
