{{- if .Values.migrationJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "policy-server.fullname" . }}-migrate
  labels:
    {{- include "policy-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    # hook-failed 포함: 마이그레이션 Job 이 실패하거나(예: 노드 부족으로 Pod 이
    # 스케줄 안 돼 helm timeout) 멈추면 즉시 삭제한다. 안 그러면 Pending Pod 이
    # 남아 cluster-autoscaler 가 "scale-up 필요" 상태로 고착돼 유휴 노드를
    # scale-down 도 못 하는 교착에 빠진다(실측 사례).
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded,hook-failed
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "policy-server.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      # No serviceAccountName: this is a pre-install hook that runs before the
      # chart's ServiceAccount (a main-phase resource) exists. The migrate Job
      # needs only DATABASE_URL, so the namespace default SA is sufficient.
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ include "policy-server.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["policy-server-migrate"]
          # 명시적 소량 요청 — 안 적으면 GKE Autopilot 이 기본값(cpu 500m /
          # memory 2Gi)을 적용해, 가벼운 sqlx 마이그레이션인데도 2Gi 를 요구하며
          # 기존 노드에 안 들어가 새 노드를 띄우려다 쿼터에 막힐 수 있다. 512Mi 면
          # 충분하고, 기존 노드 여유에 들어갈 확률이 훨씬 높다.
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 250m
              memory: 512Mi
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: DATABASE_URL
            - name: RUST_LOG
              value: {{ .Values.runtime.rustLog | quote }}
{{- end }}
