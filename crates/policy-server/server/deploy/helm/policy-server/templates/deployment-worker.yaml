apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "policy-server.fullname" . }}-worker
  labels:
    {{- include "policy-server.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      {{- include "policy-server.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "policy-server.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: worker
      annotations:
        checksum/sync-config: {{ .Values.syncConfig | sha256sum | quote }}
    spec:
      serviceAccountName: {{ include "policy-server.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          image: {{ include "policy-server.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["dambi-sync-worker"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: DAMBI_SYNC_CONFIG
              value: /app/dambi-sync.toml
            - name: REQUIRE_SYNC_CONFIG
              value: {{ .Values.runtime.requireSyncConfig | quote }}
            - name: REQUIRE_REDIS
              value: {{ .Values.runtime.requireRedis | quote }}
            - name: RUN_MIGRATIONS_ON_STARTUP
              value: {{ .Values.runtime.runMigrationsOnStartup | quote }}
            - name: SYNC_WORKER_TICK_SECS
              value: {{ .Values.worker.tickSeconds | quote }}
            - name: SYNC_LOCK_TTL_SECS
              value: {{ .Values.worker.lockTtlSeconds | quote }}
            - name: RUST_LOG
              value: {{ .Values.runtime.rustLog | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: REDIS_URL
                  optional: {{ not .Values.runtime.requireRedis }}
            - name: ETHERSCAN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: ETHERSCAN_API_KEY
                  optional: true
            - name: COINGECKO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: COINGECKO_API_KEY
                  optional: true
            - name: UNISWAP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: UNISWAP_KEY
                  optional: true
            # Dev Portal Bearer key shared by all 1inch venues (Fusion, Fusion+,
            # LOP). Optional at the secret-ref layer so charts that disable
            # 1inch venues can still deploy; values that enable 1inch should
            # provide the key or those venue fetches will fail.
            - name: ONEINCH_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: ONEINCH_KEY
                  optional: true
          volumeMounts:
            - name: sync-config
              mountPath: /app/dambi-sync.toml
              subPath: dambi-sync.toml
              readOnly: true
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
      volumes:
        - name: sync-config
          configMap:
            name: {{ include "policy-server.fullname" . }}-sync
