# Spender reputation catalog.
#
# Each entry classifies a contract address as `known` (well-understood
# venue/router), `unknown` (default for anything not listed), or
# `blocked` (community phishing reports, exploited contracts).
#
# The server loads this at startup; entries are keyed by lower-case
# 0x address. Reload is best-effort — restart the server to pick up edits.
#
# Schema:
#   [[spenders]]
#   addr  = "0x..."           # lower-case 0x40hex (required)
#   label = "Uniswap V3"      # human-friendly name (required)
#   rep   = "known"           # "known" | "blocked" (required)
#   chain = "eip155:1"        # CAIP-2; omit for cross-chain canonical (optional)
#   notes = "..."             # free text (optional)

