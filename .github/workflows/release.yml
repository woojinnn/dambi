name: release

# Tag-driven release: pushing `v*.*.*` builds Chrome + Firefox extension zips
# and attaches them to a GitHub Release. Also bundles the Cedar policy set
# and the Cargo workspace's wasm artifact so consumers can audit the engine
# bytes that shipped.
#
# Usage:
#   git tag v0.1.0
#   git push --tags

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack + Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.6.0 --activate

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - working-directory: extension
        run: yarn install --immutable

      - working-directory: extension
        name: Build Chrome MV3
        run: yarn build:chrome

      - working-directory: extension
        name: Build Firefox MV2
        run: yarn build:firefox

      - working-directory: extension
        name: Package extension zips
        run: yarn zip

      # Use an env block instead of inlining ${{ github.ref_name }} into the
      # shell — Git enforces strict ref naming so tag injection is unlikely,
      # but routing through `env:` keeps the pattern hardened against future
      # workflow-injection guidance.
      - name: Stage release artifacts
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp extension/dist/chrome.zip "release-assets/scopeball-chrome-${TAG}.zip"
          cp extension/dist/firefox.zip "release-assets/scopeball-firefox-${TAG}.zip"
          if [ -f crates/policy_engine_wasm/pkg/policy_engine_wasm_bg.wasm ]; then
            cp crates/policy_engine_wasm/pkg/policy_engine_wasm_bg.wasm \
               "release-assets/policy_engine_wasm-${TAG}.wasm"
          fi
          if [ -d extension/dist/chrome/default-policies ]; then
            (cd extension/dist/chrome && zip -r "../../release-assets/policy-set-${TAG}.zip" default-policies)
          fi
          ls -la release-assets

      - name: Generate release notes
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Last release tag prior to this one (empty if first release).
          PREV=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          {
            echo "## Scopeball ${TAG}"
            echo
            echo "### Artifacts"
            echo
            echo "- \`scopeball-chrome-${TAG}.zip\` — Chrome MV3 build (load via chrome://extensions → Load unpacked after unzip)"
            echo "- \`scopeball-firefox-${TAG}.zip\` — Firefox MV2 build"
            echo "- \`policy_engine_wasm-${TAG}.wasm\` — Cedar engine artifact (audit-grade)"
            echo "- \`policy-set-${TAG}.zip\` — bundled default policies + composed schema"
            echo
            echo "### Commits"
            echo
            if [ -n "$PREV" ]; then
              git log --pretty=format:'- %s (%h)' "${PREV}..${TAG}"
            else
              git log --pretty=format:'- %s (%h)' "${TAG}"
            fi
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
